name: probe-imagenet-linear
description: "Linear probing on ImageNet shortcut model - Method B (train/val split)"
mount:
  /131_data/: volume://131data/root
  /cvdata12/: volume://cvdata12/root
resources:
  cluster: snu-cvlab
  preset: 4gpu-a6000
  node_names:
    - cvlab14
    - cvlab16
    - cvlab17
    - cvlab19
image: nvcr.io/nvidia/jax:24.04-py3
import:
  /workspace/: git://github.com/jinkyu032/shortcut-models
run: |
  cd /workspace && \
  pip install --quiet \
    tensorflow-cpu==2.14.0 \
    tensorflow-probability==0.22.0 \
    tensorflow-datasets==4.9.4 \
    scipy==1.12.0 \
    matplotlib \
    scikit-learn \
    joblib \
    tqdm \
    einops \
    jaxtyping \
    absl-py \
    ml-collections \
    opt-einsum \
    "diffusers>=0.30.0" \
    transformers \
    Pillow \
    chex \
    typeguard && \
  python probe_linear.py \
    --checkpoint_dir "/cvdata12/jinkyu/shortcut-models/Shortcut Model Checkpoints/imagenet-shortcut2-b-fulldata800001" \
    --save_dir /cvdata12/jinkyu/probe_features/imagenet_b \
    --output_dir /cvdata12/jinkyu/probe_results/imagenet_b \
    --model_size b \
    --num_train_samples 50000 \
    --num_val_samples 50000 \
    --batch_size 64 \
    --layers last_4 \
    --dt_base_max 5 \
    --imagenet_root /131_data/datasets/ImageNetLDM
